{% extends "base.html" %}

{% block content %}

<h1>Student Registration</h1>

<form action="/signup" method="post">

    <input type="text" name="name" placeholder="Name" required><br><br>

    <input type="email" name="email" placeholder="Email" required><br><br>

    <input type="text" name="country" placeholder="Country" required><br><br>

    <input type="text" name="timezone" placeholder="Timezone" required><br><br>

    <input type="text" name="interests" placeholder="Interests" required><br><br>

    <input type="text" name="languages" placeholder="Languages" required><br><br>

    <button type="submit">Register</button>

</form>

{% endblock %}
